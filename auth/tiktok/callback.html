<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TikTok Authorization Callback | Versets Clairs Publisher</title>
    <link rel="stylesheet" href="../../styles.css" />
  </head>
  <body>
    <main class="callback-page">
      <div class="callback-card">
        <span class="brand-mark">VC</span>
        <h1>TikTok authorization</h1>
        <p id="status">Finalizing sign-in…</p>
        <a
          id="continue"
          class="button"
          href="https://probe2ka3.github.io/versets-clairs-publisher/app.html"
          style="display:none"
        >
          Continue to publisher
        </a>
        <a id="retry" class="button secondary" href="../../index.html" style="display:none">
          Back to sign-in
        </a>
      </div>
    </main>

    <script src="../../config.js"></script>
    <script>
      (function () {
        var statusEl = document.getElementById("status");
        var cont = document.getElementById("continue");
        var retry = document.getElementById("retry");
        var cfg = window.VC_CONFIG || {};
        var params = new URLSearchParams(window.location.search);
        var code = params.get("code");
        var state = params.get("state");
        var error = params.get("error");

        function fail(msg) {
          statusEl.textContent = msg;
          retry.style.display = "inline-flex";
        }

        if (error) {
          return fail("Authorization was denied or failed (" + error + ").");
        }
        if (!code) {
          return fail("Missing authorization code in the callback URL.");
        }
        // Verification anti-CSRF du state.
        var expected = sessionStorage.getItem("tiktok_oauth_state");
        if (expected && state && state !== expected) {
          return fail("State mismatch — possible CSRF, aborting.");
        }

        // Echange du code contre un token via le Worker (cote serveur).
        fetch(cfg.WORKER_URL + "/exchange", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ code: code }),
        })
          .then(function (r) { return r.json(); })
          .then(function (data) {
            if (data.error || !data.ok) {
              return fail("Token exchange failed: " + (data.detail || data.error || "unknown"));
            }
            // Les tokens restent dans le Worker Cloudflare, jamais dans le navigateur.
            if (data.open_id) sessionStorage.setItem("tiktok_open_id", data.open_id);
            if (data.scope) sessionStorage.setItem("tiktok_scope", data.scope);
            statusEl.textContent = "Connected to TikTok. You can now publish.";
            cont.style.display = "inline-flex";
            setTimeout(function () {
              window.location.href =
                "https://probe2ka3.github.io/versets-clairs-publisher/app.html";
            }, 1200);
          })
          .catch(function (e) {
            fail("Network error during token exchange: " + e);
          });
      })();
    </script>
  </body>
</html>
