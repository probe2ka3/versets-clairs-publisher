name = "versets-clairs-tiktok"
main = "worker.js"
compatibility_date = "2024-11-01"

# Variables NON sensibles
[vars]
REDIRECT_URI = "https://versetsclairs.kassos.art/auth/tiktok/callback.html"
ALLOWED_ORIGIN = "https://versetsclairs.kassos.art"
# Base publique où sont hébergées les vidéos (Cloudflare R2). Ex : https://pub-xxxx.r2.dev
VIDEO_BASE = "https://pub-8c08c849e3034768a7f988ef54ab308d.r2.dev"

# Cron Trigger : vérifie la file d'attente toutes les 5 minutes et poste les dues.
[triggers]
crons = ["*/5 * * * *"]

# Stockage KV (tokens + file d'attente).
# Créer : npx wrangler kv namespace create VC  -> coller l'id ci-dessous.
[[kv_namespaces]]
binding = "VC"
id = "722a25957cd147189f6d7267788df74f"

# Secrets (JAMAIS ici) :
#   npx wrangler secret put CLIENT_KEY
#   npx wrangler secret put CLIENT_SECRET
#   npx wrangler secret put ADMIN_KEY     # mot de passe simple pour l'UI de prog
